version: "3.8"

services:
  app:
    build: .
    container_name: tryappstack-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_started
    volumes:
      - ./Src/Uploads:/app/Src/Uploads
    networks:
      - app-network

  mongo:
    image: mongo:7
    container_name: tryappstack-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

volumes:
  mongo-data:
    driver: local

networks:
  app-network:
    driver: bridge
